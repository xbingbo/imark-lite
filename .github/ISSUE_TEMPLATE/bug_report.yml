name: Bug 反馈
description: 提交一个可复现的缺陷报告
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供完整信息，帮助我们快速定位问题。
  - type: input
    id: summary
    attributes:
      label: 问题概述
      placeholder: 用一句话描述问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 输入 ...
        3. 点击 ...
        4. 出现问题 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境信息
      placeholder: OS / 浏览器 / Node / pnpm
