name: Deploy imark-lite to GitHub Pages

on:
  push:
    branches: [ master ]  # 你的默认分支
  workflow_dispatch:     # 可以手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 设置 Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3️⃣ 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4️⃣ 安装依赖
      - name: Install dependencies
        run: pnpm install

      # 5️⃣ Lint
      - name: Lint
        run: pnpm run lint

      # 6️⃣ Typecheck
      - name: Typecheck
        run: pnpm run typecheck

      # 7️⃣ 生成静态站点
      - name: Generate static site
        run: pnpm run generate

      # 8️⃣ 上传 artifact（必须）
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs   # 这里和 nuxt.config.ts nitro.output.publicDir 保持一致

      # 9️⃣ 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
